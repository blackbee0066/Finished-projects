<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/swiper-bundle.min.css">
    <link rel="stylesheet" href="css/styles.css">
    <title>Sliding Images</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
</head>
<body>
    <section class="main swiper mySwiper">
        <div class="swiper-wrapper">
            <div class="slide swiper-slide">
                <img src="./images/393-mercedes-benz-gle-350d-mercedes-benz-car-front-view-4k.jpg" class="image" alt="">
                <div class="image_data">
                    <span class="text">The best plants for you</span>
                    <h2>Enjoy your discounted plants <br> every black friday</h2>
                    <a href="#" class="button">About Us</a>
                </div>
            </div>

            <div class="slide swiper-slide">
                <img src="./images/black-lamborghini-dark-skies-nd3dujukd1g0y155.jpg" class="image" alt="">
                <div class="image_data">
                    <span class="text">The best plants for you</span>
                    <h2>Enjoy your discounted plants <br> every black friday</h2>
                    <a href="#" class="button">About Us</a>
                </div>
            </div>
    
            <div class="slide swiper-slide">
                <img src="./images/3093-3840x2160-desktop-4k-bmw-wallpaper-image.jpg" class="image" alt="">
                <div class="image_data">
                    <span class="text">The best plants for you</span>
                    <h2>Enjoy your discounted plants <br> every black friday</h2>
                    <a href="#" class="button">About Us</a>
                </div>
            </div>
    
            
        </div>
    
        <div class="swiper-button-prev nav-btn"></div>
        <div class="swiper-button-next nav-btn"></div>
        <div class="swiper-pagination"></div>
    </section>
    
    <script src="js/swiper-bundle.min.js"></script>
    <script src="js/Index.js"></script>
</body>
</html>
