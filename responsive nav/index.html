<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <link rel="stylesheet" href=" https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.6.0/remixicon.css">
    <link rel="stylesheet" href="styles.css">
    <title>Document</title>
</head>
<body>
    <!------------HEADER-------------->

    <header class="header">
        <nav class="nav container">
            <a href="#" class="nav-logo">Logo</a>

            <div class="nav-menu" id="navMenu">
                <ul class="nav-list">
                    <li class="nav-item">
                        <a href="#" class="nav-link">Home</a>
                    </li>

                    <li class="nav-item">
                        <a href="#" class="nav-link">Services</a>
                    </li>

                    <li class="nav-item">
                        <a href="#" class="nav-link">About Us</a>
                    </li>

                    <li class="nav-item">
                        <a href="#" class="nav-link">Contact us</a>
                    </li>
                </ul>

                <!-----------close Button----------->

                <div class="nav-close" id="navClose">
                    <i class="ri-close-line"></i>
                </div>

            </div>

            <!-----------search Button----------->
            <div class="nav-actions">
             
                <i class="ri-search-line nav-search" id="searchBtn"></i>
                    
                <i class="ri-close-line clear-search" id="clearSearch" style="display: none;"></i>
                

  

                <!-------------Login Button------------->
                <i class="ri-user-3-line nav-login" id="loginBtn"></i>

                <!------------------Toggle Button----------------->
                <div class="nav-toggle" id="navToggle">
                    <i class="ri-menu-line"></i>
                </div>
            </div>

        </nav>

    </header>

    <!------------SEARCH MOBILE DEVICES-------------->
    <div class="search" id="search">

        <form action="" class="search-form">
            <i class="ri-search-line search-icon"></i>

            <input type="search" class="search-input" id="searchInput" placeholder="Search for something...">
        </form>   

        <i class="ri-close-line search-close" id="searchClose"></i>

    </div>


    <!-----------------LOGIN----------------->
    <div class="login" id="login">
        <form action="" class="login-form">

            <h2 class="login-title">Log in</h2>

            <div class="login-group">
                <div>
                    <label for="email" class="login-label">Email</label>
                    <input type="email" placeholder="your email here" class="login-input" id="email" required>
                </div>
                <div>
                    <label for="password" class="login-label">Password</label>
                    <input type="password" placeholder="your password here" class="login-input" id="password" required>
                </div>
            </div>

            <div>
                <p class="login-sign-up">
                    Dont have an account? <a href="#">sign up</a>
                </p>

                <a href="#" class="login-forgot">Forgot your password?</a>

                <button type="submit" class="login-button">Log in</button>
            </div>
        </form> 
        <i class="ri-close-line close-login" id="closeLogin"></i>
    </div>



    <!------------MAIN------------------>
    <main class="main">

    </main>



    <script src="index.js"></script>
</body>
</html>
